---
- name: Deploy application with Docker Compose
  hosts: all
  become: true
  vars:
    deploy_path: /home/ubuntu/openwebui
    deploy_owner: ubuntu
    deploy_group: ubuntu
    compose_service_name: openwebui.service
  tasks:
    - name: Ensure deploy directory exists
      ansible.builtin.file:
        path: "{{ deploy_path }}"
        state: directory
        owner: "{{ deploy_owner }}"
        group: "{{ deploy_group }}"
        mode: "0755"

    - name: Ensure rsync is installed
      ansible.builtin.apt:
        name: rsync
        state: present
        update_cache: true

    - name: Sync repository contents to remote (exclude infra folders)
      ansible.builtin.synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ deploy_path }}/"
        rsync_opts:
          - "--exclude=opentofu"
          - "--exclude=ansible"
          - "--exclude=.git"
      become: false

    - name: Provision systemd unit for Docker Compose stack
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ compose_service_name }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=OpenWebUI service with Docker Compose
          PartOf=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=true
          WorkingDirectory={{ deploy_path }}
          ExecStart=/usr/bin/docker compose up -d --build --remove-orphans
          ExecStop=/usr/bin/docker compose down

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and restart Docker Compose systemd unit
      ansible.builtin.systemd:
        name: "{{ compose_service_name }}"
        enabled: true
        state: restarted
